<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Colors for Kids</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; }
        h1 { color: #2c3e50; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; border: 4px solid transparent; }
        .card:hover { transform: scale(1.05); border-color: #3498db; }
        .color-box { width: 100%; height: 120px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; }
        .tamil-text { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 5px; }
        .english-text { color: #7f8c8d; font-style: italic; }
        .speaker-icon { font-size: 1.2rem; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

    <h1>வண்ணங்கள் (Colors)</h1>
    <p>நிறத்தை அழுத்தினால் அதன் பெயரைத் தமிழில் கேட்கலாம்!</p>

    <div class="grid" id="colorGrid"></div>

    <script>
    const colors = [
        { tamil: "சிவப்பு", english: "Red", hex: "#FF0000" },
        { tamil: "பச்சை", english: "Green", hex: "#2ECC71" },
        { tamil: "நீலம்", english: "Blue", hex: "#3498DB" },
        { tamil: "மஞ்சள்", english: "Yellow", hex: "#F1C40F" },
        { tamil: "கருப்பு", english: "Black", hex: "#2C3E50" },
        { tamil: "வெள்ளை", english: "White", hex: "#FFFFFF" },
        { tamil: "ஊதா", english: "Purple", hex: "#9B59B6" },
        { tamil: "செம்மஞ்சள்", english: "Orange", hex: "#E67E22" }
    ];

    const grid = document.getElementById('colorGrid');

    // This function uses the BROWSER'S internal voice (No CORS errors!)
    function speakTamil(text) {
        window.speechSynthesis.cancel(); // Stop any current speech
        
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'ta-IN';
        msg.rate = 0.8;

        // Force browser to find the Tamil voice
        const voices = window.speechSynthesis.getVoices();
        const tamilVoice = voices.find(v => v.lang.includes('ta'));
        if (tamilVoice) msg.voice = tamilVoice;

        window.speechSynthesis.speak(msg);
    }

    // IMPORTANT: GitHub requires a "warm up" for voices
    window.speechSynthesis.onvoiceschanged = () => {
        console.log("Voices ready for GitHub");
    };

    colors.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => speakTamil(item.tamil);
        
        card.innerHTML = `
            <div class="color-box" style="background-color: ${item.hex}"></div>
            <span class="tamil-text">${item.tamil} <span class="speaker-icon">🔊</span></span>
            <span class="english-text">${item.english}</span>
        `;
        grid.appendChild(card);
    });
</script>
</body>
</html>
